<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Layout Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  --bg:#0d1117; --panel:#161b22; --border:#30363d;
  --accent:#2f81f7; --text:#e6edf3; --muted:#8b949e;
  --green:#3fb950; --red:#f85149; --yellow:#d29922;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:ltr}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:40px 36px;width:360px;box-shadow:0 16px 48px rgba(0,0,0,.6)}
.login-box h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;text-align:left}
.field input{width:100%;background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s;text-align:left}
.field input:focus{border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent);border:none;border-radius:6px;padding:12px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .2s}
.login-btn:hover{opacity:.85}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:12px;min-height:16px}

/* APP */
#app{display:none;flex-direction:column;height:100vh;width:100vw;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;gap:10px}
.topbar-title{font-size:15px;font-weight:700}
.legend{display:flex;align-items:center;gap:12px}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.leg-dot{width:12px;height:12px;border-radius:2px}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
.topbar-user strong{color:#79c0ff}
.clock{background:#0d1117;border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;font-variant-numeric:tabular-nums}
.statusbar{padding:4px 16px;background:#0a0d13;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;gap:10px;flex-shrink:0}
#save-status{color:var(--green)}

/* MAP */
#map-wrap{flex:1;overflow:auto;background:#1a1a2e;cursor:grab;position:relative}
#map-wrap:active{cursor:grabbing}
#map-inner{padding:20px;width:fit-content;min-width:100%;min-height:100%;display:flex;align-items:flex-start;justify-content:center}

/* SVG wrapper */
#map-svg-wrapper{background:white;border-radius:4px;box-shadow:0 0 40px rgba(0,0,0,.5);line-height:0}
#map-svg-wrapper svg{display:block}

/* LOG */
#log-panel{position:fixed;right:12px;bottom:12px;width:260px;background:var(--panel);border:1px solid var(--border);border-radius:8px;font-size:11px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.5);direction:ltr}
.log-hdr{padding:7px 10px;background:#0d1117;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);font-weight:600;border-radius:8px 8px 0 0}
#log-btn{background:none;border:none;color:var(--muted);cursor:pointer}
#log-body{max-height:160px;overflow-y:auto;padding:6px 10px}
.log-e{padding:4px 0;border-bottom:1px solid var(--border);color:var(--muted);line-height:1.5;text-align:left}
.log-e:last-child{border-bottom:none}
.log-e strong{color:#79c0ff}
.c-g{color:var(--green);font-weight:700}
.c-r{color:var(--red);font-weight:700}
.c-y{color:var(--yellow);font-weight:700}
.c-w{color:var(--muted);font-weight:700}

/* TOAST */
#toast{position:fixed;bottom:190px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 16px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;white-space:nowrap}
#toast.show{opacity:1}

/* SVGs Interactive Disks Styles */
[data-disk] { cursor: pointer; transition: opacity 0.2s; }
[data-disk]:hover { opacity: 0.7; }
</style>
</head>
<body>

<div id="login-screen">

    <h1>🗺️ Interactive Layout Map</h1>
    <p>Enter your username and password to log in</p>
    <div class="field"><label>Username</label><input type="text" id="inp-name" placeholder="e.g. admin" autocomplete="off"></div>
    <div class="field"><label>Password</label><input type="password" id="inp-pass" placeholder="••••••••••" autocomplete="off"></div>
    <button class="login-btn" onclick="doLogin()">Login</button>

  <div id="log-panel">
    <div class="log-hdr"><span>Action History</span><button id="log-btn" onclick="toggleLog()">▾</button></div>
    <div id="log-body"></div>
  </div>

<div id="toast"></div>

<script>
const LK = 'interactive_map_logs';
let log = JSON.parse(localStorage.getItem(LK)) || [];
let logOpen = true;
let toastT;

// LOGIN VALIDATION
function doLogin() {
  const name = document.getElementById('inp-name').value.trim();
  const pass = document.getElementById('inp-pass').value.trim();
  const err = document.getElementById('login-err');
  
  if(!name || !pass) {
    err.textContent = "Please enter both username and password.";
    return;
  }
  if(pass !== "1234") {
    err.textContent = "Incorrect password.";
    return;
  }
  
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('disp-name').textContent = name;
  document.getElementById('session-info').textContent = `User: ${name} | Authority: Administrator`;
  
  tick();
  setInterval(tick, 1000);
  renderLog();
  initDisks();
}

// DISKS CLICK LOGIC
function initDisks() {
  document.querySelectorAll('[data-disk]').forEach(disk => {
    disk.addEventListener('click', () => {
      const id = disk.getAttribute('data-disk');
      let cur = disk.getAttribute('fill');
      let nxt, cls, lbl;
      
      if(cur === '#22c55e' || cur === 'green') { nxt = '#ef4444'; cls = 'c-r'; lbl = 'Red'; }
      else if(cur === '#ef4444' || cur === 'red') { nxt = '#eab308'; cls = 'c-y'; lbl = 'Yellow'; }
      else { nxt = '#22c55e'; cls = 'c-g'; lbl = 'Green'; }
      
      disk.setAttribute('fill', nxt);
      addLog(`Disk <strong>${id}</strong> changed to <span class="${cls}">${lbl}</span>`);
      toast(`${id} updated to ${lbl}`);
    });
  });
}

function addLog(html) {
  log.push({html, ts: Date.now()});
  if (log.length > 100) log.shift();
  localStorage.setItem(LK, JSON.stringify(log));
  renderLog();
}

function renderLog() {
  document.getElementById('log-body').innerHTML = log.slice().reverse().map(e => `<div class="log-e">${e.html}</div>`).join('');
}

function toggleLog() {
  logOpen = !logOpen;
  document.getElementById('log-body').style.display = logOpen ? '' : 'none';
  document.getElementById('log-btn').textContent = logOpen ? '▾' : '▴';
}

// CLOCK
function tick() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US');
}

// TOAST
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 1500);
}

// PANNING
const wrap = document.getElementById('map-wrap');
let panning=false, sx, sy, sl, st;
wrap.addEventListener('mousedown', e => {
  if (e.target.closest('[data-disk]')) return;
  panning=true; sx=e.pageX-wrap.offsetLeft; sy=e.pageY-wrap.offsetTop;
  sl=wrap.scrollLeft; st=wrap.scrollTop;
});
wrap.addEventListener('mouseleave', () => panning=false);
wrap.addEventListener('mouseup', () => panning=false);
wrap.addEventListener('mousemove', e => {
  if(!panning) return;
  e.preventDefault();
  const x = e.pageX-wrap.offsetLeft;
  const y = e.pageY-wrap.offsetTop;
  wrap.scrollLeft = sl - (x - sx);
  wrap.scrollTop = st - (y - sy);
});
</script>
